<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YUMS – LPU Attendance Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#111111" />
  <meta name="description" content="YUMS — Track your LPU UMS attendance instantly." />
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" /></noscript>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="login-body login-body--minimal">

  <div class="login-minimal-wrap">
    <div class="login-minimal-logo">🎓</div>
    <h1 class="login-minimal-title">YUMS</h1>
    <p class="login-minimal-sub">LPU Attendance Tracker</p>

    <div id="loginError" class="error-msg hidden"></div>
    <div id="loginInfo"  class="info-msg  hidden"></div>

    <form autocomplete="off" onsubmit="event.preventDefault(); startLogin();">
      <!-- Hidden honeypot to prevent browser autofill from injecting password fields -->
      <input type="text" name="prevent_autofill_name" style="display:none" tabindex="-1" />
      <input type="password" name="prevent_autofill_pass" style="display:none" tabindex="-1" />

      <input id="regNoInput" type="text" class="login-input" placeholder="Registration Number"
             autocomplete="off" inputmode="numeric" spellcheck="false" />

      <button id="loginBtn" type="submit" class="btn btn-primary login-minimal-btn">
        <span id="loginBtnText">Login with UMS</span>
        <span id="loginSpinner" class="spinner hidden"></span>
      </button>
    </form>

    <p class="privacy-note">🔒 Your credentials are sent securely to fetch your data and are <strong>never</strong> stored.</p>
  </div>

  <script src="app.js"></script>
</body>

</html>
